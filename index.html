<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 90%;
        }

        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .sticker {
            width: 150px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #999;
            color: white;
            position: relative;
        }

        .hidden {
            display: none;
        }

        #sorryMsg {
            color: #ff4d6d;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating background stickers */
        .bg-sticker {
            position: absolute;
            font-size: 2rem;
            z-index: 1;
            opacity: 0.6;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="bg-sticker" style="top: 10%; left: 10%;">🥺</div>
    <div class="bg-sticker" style="top: 20%; right: 15%;">💖</div>
    <div class="bg-sticker" style="bottom: 15%; left: 20%;">✨</div>
    <div class="bg-sticker" style="bottom: 10%; right: 10%;">🙏</div>

    <div class="container" id="mainCard">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXJ3bm03NmxoZnZ6Z3N5Zmt6ZnB6YmRzZ3B6YmRzZ3B6YmRzZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9uH6x89D6mU4Iu4/giphy.gif" alt="Cute Cat Sorry" class="sticker">
        
        <div id="questionArea">
            <h1>Are you hurt by me?</h1>
            <div class="buttons">
                <button id="yesBtn">Yes</button>
                <button id="noBtn" onmouseover="moveButton()">No</button>
            </div>
        </div>

        <div id="sorryMsg" class="hidden">
            <h1>I'm so sorry! 🥺</h1>
            <p>I never meant to hurt you. You mean the world to me and I'll do anything to make it up to you! ❤️</p>
            <p style="font-size: 0.8rem;">(Please forgive me?)</p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionArea = document.getElementById('questionArea');
        const sorryMsg = document.getElementById('sorryMsg');

        // Function to move the "No" button so they can't click it easily
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = "absolute";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        // Action when "Yes" is clicked
        yesBtn.addEventListener('click', () => {
            questionArea.classList.add('hidden');
            sorryMsg.classList.remove('hidden');
            createHearts();
        });

        // Cute heart rain effect
        function createHearts() {
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-5vh';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                heart.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(heart);
            }
        }

        // Animation for falling hearts
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fall {
                to { transform: translateY(110vh) rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
